<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap表格</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss03-ai.css">
    <style>
        .container{
            background-color: var(--glow-amber);
            margin: 0 auto;
            padding: 10px;
        }
    </style>

    
</head>
<body>
    <div class="container">
        <div class="display-1 text-center">ch5. 表格(table)</div>
    </div>
    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
               <th>編號</th>
               <th>品名</th>
               <th>價格</th>
               <th>數量</th>
               <th>備註</th>
            </tr>
        </thead>
        <tbody>
            <tr class="table-primary">
                <td>001</td>
                <td>美式咖啡</td>
                <td>50</td>
                <td>10</td>
                <td>不加糖</td>
            </tr>
            <tr class="table-success">
                <td>002</td>
                <td>拿鐵咖啡</td>
                <td>100</td>
                <td>10</td>
                <td>不加糖</td>
            </tr>
            <tr class="table-danger">
                <td>003</td>
                <td>摩卡咖啡</td>
                <td>100</td>
                <td>10</td>
                <td>不加糖</td>
            </tr>
            <tr class="table-warning">
                <td>004</td>
                <td>卡布其諾咖啡</td>
                <td>100</td>
                <td>10</td>
                <td>不加糖</td>
            </tr>
            <tr class="table-info">
                <td>005</td>
                <td>鴛鴦咖啡</td>
                <td>100</td>
                <td>10</td>
                <td>不加糖</td>
            </tr>
        </tbody>
    </table>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
