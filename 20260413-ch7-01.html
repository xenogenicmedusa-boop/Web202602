<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>版面練習</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss03-ai.css">
    <style>
        body{
            background-color: var(--gray-50);
        }
        .header{
            height: 100px;
            line-height: 100px;
            font-size: 28px;
            font-weight: 900;
            margin-top: 15px;
            border-radius: 10px;
        }
        .box01{
            height: 80px;
            line-height: 80px;
            font-size: 28px;
            font-weight: 700;
            margin-top: 15px;
            border-radius: 10px;
        }
        .photo-box{
            height: 150px;
            line-height: 150px;
            margin-top: 15px;
            border-radius: 10px;
        }
        .text-box{
            height: 150px;
            line-height: 150px;
            margin-top: 15px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 28px;
        }
        .box02{
            margin-top: 15px;
            height: 100px;
            line-height: 50px;
            border-radius: 10px;
            font-size: 28px;
            text-align: center;
            justify-content: center;
        }
        .box03{
            margin-top: 15px;
            height: 100px;
            line-height: 100px;
            border-radius: 10px;
             font-size: 28px;
        }
        .box04{
            margin-top: 15px;
            height: 100px;
            line-height: 100px;
            border-radius: 10px;
            color: aliceblue;
            font-size: 28px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-10 d-none d-md-block">
                <div class="header text-center"
                    style="background-image: url(images/galaxy06.jpg); background-position: center center; background-size: cover; ">Bangtan Sonyeon Dan
                </div>
            </div>
        </div>
        <div class="row justify-content-between">
            <div class="col-md-3">
                <div class="box01 bg-success text-white text-center">OVERVIEW</div>
            </div>
            <div class="col-md-3">
                <div class="box01 bg-warning text-center">MEMBERS</div>
            </div>
            <div class="col-md-3">
                <div class="box01 bg-primary text-center">SONGS</div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6"><div class="photo-box" style="background-image: url(images/galaxy07.jpg); background-position: center center; background-size: cover;"></div></div>
            <div class="col-md-6"><div class="text-box text-center bg-secondary">ARIRANG</div></div>
        </div>
        <div class="row flex-row-reverse">
            <div class="col-md-6"><div class="photo-box" style="background-image: url(images/galaxy08.jpg); background-position: center center; background-size: cover;"></div></div>
            <div class="col-md-6"><div class="text-box text-center bg-info">SWIM</div></div>
        </div>
        <div class="row flex-column">
            <div class="col-md-4 align-self-md-start"><div class="box02 bg-success d-flex align-items-center text-white">BUTTER</div></div>
            <div class="col-md-4 align-self-md-center"><div class="box02 bg-warning d-flex align-items-center text-white">FIRE</div></div>
            <div class="col-md-4 align-self-md-end"><div class="box02 bg-primary d-flex align-items-center text-white">PERMISSION TO DANCE</div></div>
        </div>
        <div class="row flex-md-row-reverse">
            <div class="col-sm-6 col-md-3"><div class="box03 bg-success text-center text-white">01</div></div>
            <div class="col-sm-6 col-md-3"><div class="box03 bg-warning text-center">02</div></div>
            <div class="col-sm-6 col-md-3"><div class="box03 bg-primary text-center text-white">03</div></div>
            <div class="col-sm-6 col-md-3"><div class="box03 bg-secondary text-center">04</div></div>
        </div>
        <div class="row">
            <div class="col-md-3"><div class="box04 bg-black text-center">左</div></div>
            <div class="col-md-3 ms-auto"><div class="box04 bg-black text-center">右</div></div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-10 d-none d-xl-block"><div class="box01 bg-warning text-center">這一塊XL出現</div>
            </div>
        </div>
    </div>
    
    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
