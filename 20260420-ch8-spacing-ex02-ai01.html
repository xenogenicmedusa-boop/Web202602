<!-- 請用我目前已學過的Bootstrap切版技術，幫我設計一個更貼近實務的商業首頁版面。

需求:
- 主題是____(自行替換)
- 只能使用container-fluid、row、col、d-flex、vh-100、h-50、背景圖、roller效果
- 可以微調語法，但不要加入太多新技術
- 版面要像真實品牌官網首頁，不要像練習作業或圖片拼貼
- 圖片請幫我在網路上蒐尋合適的照片
- 必須有主視覺、促銷區、分類入口、主打商品或服務、CTA區
- 文案要像真的商業網站，不要太空泛
- 請直接給我完整HTML
- 最後補充這個版面的商業邏輯與教學重點 -->
<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misty Sweets | 迷霧手作甜點 - 官方網站</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss03-ai.css">
</head>

<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <div class="col-12 bg-cover vh-100 d-flex align-items-center justify-content-center"
                style="background-image: url('https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&q=80&w=1920');">
                <div class="text-center p-5" style="background-color: rgba(255,255,255,0.7); backdrop-filter: blur(5px); border-radius: 20px;">
                    <h1 class="display-3 fw-bold" style="color: var(--void-brown);">Misty Sweets</h1>
                    <p class="lead mb-4" style="color: var(--land-brown);">在薄霧般的午後，品味最純粹的法式優雅</p>
                    <a href="#shop" class="btn btn-lg px-5 py-3" style="background-color: var(--glow-sun); color: white;">立即預約下單</a>
                </div>
            </div>
        </div>

        <div class="row g-0" id="shop">
            <div class="col-md-4 vh-100 bg-cover roller-box-left"
                style="background-image: url('https://images.unsplash.com/photo-1550617931-e17a7b70dce2?auto=format&fit=crop&q=80&w=800');">
                <div class="roller">
                    <div class="text-center text-white">
                        <h3 class="fw-bold">經典瑪德蓮</h3>
                        <p>嚴選伊斯尼奶油</p>
                        <a href="#" class="btn btn-outline-light">瀏覽分類</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 vh-100 bg-cover roller-box-top"
                style="background-image: url('https://images.unsplash.com/photo-1578985543812-05258247a158?auto=format&fit=crop&q=80&w=800');">
                <div class="roller bg-cover" style="background-image: url(images/Crêpe-Cake.jpg);">
                    <div class="text-center text-white">
                        <h3 class="fw-bold">客製化蛋糕</h3>
                        <p>為珍貴的時刻留念</p>
                        <a href="#" class="btn btn-outline-light">預約諮詢</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 vh-100 bg-cover roller-box-right"
                style="background-image: url('https://images.unsplash.com/photo-1488477181946-6428a0291777?auto=format&fit=crop&q=80&w=800');">
                <div class="roller">
                    <div class="text-center text-white">
                        <h3 class="fw-bold">午茶組合</h3>
                        <p>迷霧般的午後時光</p>
                        <a href="#" class="btn btn-outline-light">了解更多</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-0">
            <div class="col-md-6 vh-100 bg-cover roller-box-left-top"
                style="background-image: url('https://images.unsplash.com/photo-1519340333755-507213437397?auto=format&fit=crop&q=80&w=1200');">
                <div class="roller">
                    <div class="text-center text-white p-5">
                        <div class="bg-cover" style="background-image: url(images/Strawberry\ Mille\ Crêpe\ Cake.jpg); height: 220px;"></div>
                        <h2 class="display-5 fw-bold">本月限定：草莓千層</h2>
                        <p>日本空運草莓搭配清爽鮮奶油</p>
                        <a href="#" class="btn btn-primary btn-lg">限時搶購</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="d-flex flex-column h-100">
                    <div class="h-50 bg-cover roller-box-right-top"
                        style="background-image: url('https://images.unsplash.com/photo-1559181567-c3190ca9959b?auto=format&fit=crop&q=80&w=800');">
                        <div class="roller">
                            <a href="#" class="btn btn-primary">手工果醬系列</a>
                        </div>
                    </div>
                    <div class="h-50 bg-cover roller-box-right-bottom"
                        style="background-image: url('https://images.unsplash.com/photo-1481391319762-47dff72954d9?auto=format&fit=crop&q=80&w=800');">
                        <div class="roller">
                            <a href="#" class="btn btn-primary">精選禮盒組</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-0">
            <div class="col-12 p-5 text-center" style="background-color: var(--fog-01);">
                <div class="py-5">
                    <h2 class="fw-bold mb-4" style="color: var(--void-brown);">「甜點是生活的調味品，而我們負責為您調出浪漫。」</h2>
                    <p class="mb-5" style="color: var(--land-brown);">訂閱我們的最新消息，獲取首購 9 折優惠券</p>
                    <div class="d-flex justify-content-center">
                        <div class="input-group mb-3 w-50">
                            <input type="text" class="form-control" placeholder="您的 Email 地址">
                            <button class="btn btn-primary" type="button">送出</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
