<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWD Website Template</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Navbar */
        .navbar {
            height: 60px;
            background: #222;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .navbar h2 {
            flex: 1;
        }

        /* 漢堡按鈕 */
        .menu-btn {
            font-size: 28px;
            cursor: pointer;
            display: inline-block;
            margin-right: 10px;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100%;
            background: #333;
            position: fixed;
            left: 0;
            top: 60px;
            padding-top: 20px;

        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #555;
        }

        /* 主內容 */
        .main {
            margin-left: 220px;
            padding: 20px;
        }

        /* 卡片區 */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 10px;
        }

        /* 手機版 */
        @media(max-width:768px) {
            .main-btn {
                display: block;
               
            }

            .sidebar {
                left: -220px;
                transition: 0.3s;
                z-index: 1000;
            }

            .sidebar.show {
                left: 0;
            }

            .main {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <div class="navbar">
        <span class="menu-btn" onclick="toggleMenu()">☰</span>
        <h2>My Website</h2>
    </div>
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <a href="#">首頁</a>
        <a href="#">商品</a>
        <a href="#">服務</a>
        <a href="#">關於我們</a>
        <a href="#">聯絡我們</a>
    </div>
    <!-- 主內容 -->
    <div class="main">
        <h1>歡迎來到網站</h1>
        <p>這是一個完整RWD網站模板</p>
        <div class="cards">
            <div class="card">
                <h3>功能1</h3>
                <p>內容介紹</p>
            </div>
            <div class="card">
                <h3>功能2</h3>
                <p>內容介紹</p>
            </div>
            <div class="card">
                <h3>功能3</h3>
                <p>內容介紹</p>
            </div>
            <div class="card">
                <h3>功能4</h3>
                <p>內容介紹</p>
            </div>
        </div>
    </div>
    <script>
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("show");
        }
    </script>
</body>

</html>
