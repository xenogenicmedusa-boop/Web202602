<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ch06 - 切版練習</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss03-ai.css">
    <style>
        body{
            background-color: antiquewhite;
        }
        .box01{
            background-image: url(images/paris01.jpg);
            height: 220px;
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            margin-top: 15px;
        }
        .box02 {
            background-color: var(--mint-100);
            box-shadow: 2px 2px 4px 2px var(--mint-900);
            border-radius: 10px;
            height: 100px;
            margin-top: 15px;
            text-align: center;
            line-height: 100px;
            font-size: 24px;
            color: var(--void-brown);
            font-weight: 900;
        }
        @media screen and (min-width: 992px) {
            .box02{
                border-radius: 50%;
                height: 150px;
                width: 150px;
                line-height: 150px;
                font-size: 26px;
                background-color: var(--mint-300);
            }
        }
        @media screen and (min-width: 1220px) {
            .box02{
                border-radius: 50%;
                height: 180px;
                width: 180px;
                line-height: 180px;
                font-size: 28px;
                background-color: var(--mint-600);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-12 d-none d-sm-block">
                <div class="box01"></div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-6 col-md-3">
                <div class="box02">選單01</div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="box02">選單02</div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="box02">選單03</div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="box02">選單04</div>
            </div>
        </div>
        
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
