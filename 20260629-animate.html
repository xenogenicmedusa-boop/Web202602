<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動畫練習</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/animate.min.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-3 bg-primary p-5 mt-5 wow animate__fadeInRightBig" data-wow-duration="2s" data-wow-delay="5s" data-wow-iteration="2"></div>
        </div>
        <div class="row">
            <div class="col-3 bg-primary p-5 mt-5 wow animate__fadeInDown" data-wow-duration="2s" data-wow-delay="5s" data-wow-iteration="10"></div>
        </div>
        <div class="row">
            <div class="col-3 bg-primary p-5 mt-5 animate__animated animate__fadeInUpBig"></div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/wow.min.js"></script>
    <script>
              new WOW().init();
              </script>
</body>
</html>
