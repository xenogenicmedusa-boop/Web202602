<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roller卷軸</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss03-ai.css">    
    <style>
        .box {
            height: 220px;
        }        
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-6 mt-5">
                <div class="roller-box-top">
                    <div class="roller"><a href="https://unsplash.com/s/photos/universe"
                            class="btn btn-primary">查看更多</a></div>
                    <div class="box" style="background-image: url(images/landscape01.jpg); background-size: cover;">
                    </div>
                </div>
            </div>
            <div class="col-6 mt-5">
                <div class="roller-box-bottom">
                    <div class="roller"><a href="#" class="btn btn-primary">查看更多</a></div>

                    <div class="box" style="background-image: url(images/landscape02.jpg); background-size: cover;">
                    </div>
                </div>
            </div>
            <div class="col-6 mt-5">
                <div class="roller-box-left">
                    <div class="roller"><a href="#" class="btn btn-primary">查看更多</a>
                    </div>
                    <div class="box" style="background-image: url(images/landscape03.jpg); background-size: cover;">
                    </div>
                </div>
            </div>
            <div class="col-6 mt-5">
                <div class="roller-box-right">
                    <div class="roller"><a href="#" class="btn btn-primary">查看更多</a></div>

                    <div class="box" style="background-image: url(images/landscape04.jpg); background-size: cover;">
                    </div>
                </div>
            </div>
            <div class="col-6 mt-5">
                <div class="roller-box-left-top">
                    <div class="roller"><a href="#" class="btn btn-primary">左上方</a></div>

                    <div class="box" style="background-image: url(images/landscape05.jpg); background-size: cover;">
                    </div>
                </div>
            </div>
            <div class="col-6 mt-5">
                <div class="roller-box-left-bottom">
                    <div class="roller"><a href="#" class="btn btn-primary">左下方</a></div>

                    <div class="box" style="background-image: url(images/landscape06.jpg); background-size: cover;">
                    </div>
                </div>
            </div>
            <div class="col-6 mt-5">
                <div class="roller-box-right-top">
                    <div class="roller"><a href="#" class="btn btn-primary">右上方</a></div>

                    <div class="box" style="background-image: url(images/landscape07.jpg); background-size: cover;">
                    </div>
                </div>
            </div>
            <div class="col-6 mt-5">
                <div class="roller-box-right-bottom">
                    <div class="roller"><a href="#" class="btn btn-primary">右下方</a></div>

                    <div class="box" style="background-image: url(images/landscape08.jpg); background-size: cover;">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
